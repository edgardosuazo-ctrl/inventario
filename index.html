<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
:root{
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#f8fafc;--bg4:#e2e8f0;
  --accent:#6366f1;--accent-light:#eef2ff;--accent-dark:#4f46e5;
  --green:#10b981;--green-light:#ecfdf5;
  --red:#ef4444;--red-light:#fef2f2;
  --yellow:#f59e0b;--yellow-light:#fffbeb;
  --blue:#3b82f6;--blue-light:#eff6ff;
  --border:#e2e8f0;--text:#1e293b;--muted:#94a3b8;--muted2:#64748b;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.08),0 2px 4px -1px rgba(0,0,0,.05);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -2px rgba(0,0,0,.04);
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:62px;box-shadow:var(--shadow);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(99,102,241,.3);}
.logo-sub{font-size:11px;color:var(--muted);font-weight:400;letter-spacing:0.3px;margin-top:1px}
.nav{display:flex;gap:2px;margin-left:auto}
.nav-btn{background:transparent;border:none;color:var(--muted2);padding:8px 14px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;border-radius:var(--radius-sm);transition:all 0.18s;display:flex;align-items:center;gap:6px;}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.main{flex:1;padding:24px;overflow:auto;max-width:1400px;margin:0 auto;width:100%}
.section-title{font-size:12px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:var(--shadow);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.field-label{font-size:12px;font-weight:600;color:var(--muted2);margin-bottom:6px;display:block;letter-spacing:0.2px;}
.input{width:100%;background:#fff;border:1.5px solid var(--border);color:var(--text);padding:9px 12px;font-family:inherit;font-size:13px;border-radius:var(--radius-sm);outline:none;transition:border-color 0.18s,box-shadow 0.18s;}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.12)}

.select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.btn{padding:9px 18px;border:1.5px solid transparent;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;border-radius:var(--radius-sm);transition:all 0.18s;display:inline-flex;align-items:center;gap:7px;letter-spacing:0.2px;}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.25)}

.btn-danger{background:#fff;border-color:#fca5a5;color:var(--red)}

.btn-warn{background:#fff;border-color:#fcd34d;color:var(--yellow)}
.btn-warn:hover{background:var(--yellow-light);border-color:var(--yellow)}
.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.25)}
.btn-blue:hover{background:#2563eb;transform:translateY(-1px)}
.btn-green{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.25)}
.btn-green:hover{background:#059669;transform:translateY(-1px)}
.btn-red-solid{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 8px rgba(239,68,68,.25)}
.btn-red-solid:hover{background:#dc2626;transform:translateY(-1px)}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{background:#f8fafc;color:var(--muted2);padding:10px 14px;text-align:left;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;border-bottom:2px solid var(--border);white-space:nowrap;}
.table td{padding:11px 14px;border-bottom:1px solid #f1f5f9;color:var(--text);vertical-align:middle}
.table tbody tr:hover td{background:#fafbff}
.table tbody tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.3px;}
.badge-green{background:var(--green-light);color:#065f46}
.badge-red{background:var(--red-light);color:#991b1b}
.badge-yellow{background:var(--yellow-light);color:#92400e}
.badge-blue{background:var(--blue-light);color:#1e40af}
.badge-purple{background:var(--accent-light);color:#4338ca}
.badge-gray{background:#f1f5f9;color:#475569}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--card-color,var(--accent)),transparent);}
.stat-num{font-size:28px;font-weight:800;line-height:1;color:var(--card-color,var(--accent));letter-spacing:-1px}
.stat-lbl{font-size:12px;color:var(--muted2);font-weight:500;margin-top:6px}
.stat-icon{position:absolute;top:16px;right:16px;font-size:24px;opacity:.15}
.scanner-box{background:linear-gradient(135deg,#f8faff,#eef2ff);border:2px dashed #a5b4fc;border-radius:var(--radius);padding:28px 20px;text-align:center;margin-bottom:16px;cursor:pointer;user-select:none;transition:all 0.2s;}
.scanner-box:hover{border-color:var(--accent);background:var(--accent-light)}
.scanner-active{border-color:var(--blue);background:var(--blue-light)!important;border-style:solid}
.scanner-hint{font-size:12px;color:var(--muted2);margin-top:8px}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:#f1f5f9;padding:4px;border-radius:var(--radius-sm);width:fit-content}
.tab{padding:8px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted2);border-radius:var(--radius-xs);transition:all 0.18s;background:none;border:none;font-family:inherit;}
.tab:hover{color:var(--text)}
.tab.active{background:#fff;color:var(--accent);font-weight:600;box-shadow:var(--shadow)}
.scrollable{max-height:420px;overflow-y:auto}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px;font-weight:500;color:var(--muted2)}
.empty-sub{font-size:12px;color:var(--muted);margin-top:4px}
.stock-low{color:var(--yellow);font-weight:600}
.stock-ok{color:var(--green);font-weight:600}
.stock-zero{color:var(--red);font-weight:600}
.kardex-row-in td{background:#f0fdf4!important}
.kardex-row-out td{background:#fff5f5!important}
.kardex-row-in:hover td{background:#dcfce7!important}
.kardex-row-out:hover td{background:#fee2e2!important}
.alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-weight:500}
.alert-success{background:var(--green-light);border:1px solid #a7f3d0;color:#065f46}
.alert-error{background:var(--red-light);border:1px solid #fca5a5;color:#991b1b}
.alert-info{background:var(--blue-light);border:1px solid #bfdbfe;color:#1e40af}
.flex{display:flex;gap:8px;align-items:center}
.mt8{margin-top:8px}.mt16{margin-top:16px}.mb8{margin-bottom:8px}.mb16{margin-bottom:16px}
.toast{position:fixed;top:20px;right:20px;z-index:9999;min-width:300px;padding:14px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);animation:slideIn 0.3s ease;display:flex;align-items:center;gap:10px;}
.toast.alert-success{background:#fff;border-left:4px solid var(--green);color:#065f46}
.toast.alert-error{background:#fff;border-left:4px solid var(--red);color:#991b1b}
.toast.alert-info{background:#fff;border-left:4px solid var(--blue);color:#1e40af}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f1f5f9;border-radius:3px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 40%,#4f46e5 100%);padding:20px;}
.login-card{background:#fff;border-radius:20px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,.3);}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;box-shadow:0 8px 24px rgba(99,102,241,.4);}
.login-title{font-size:24px;font-weight:800;color:#1e293b;letter-spacing:-0.5px}
.login-sub{font-size:13px;color:#94a3b8;margin-top:4px}
.login-field{margin-bottom:18px}
.login-input-wrap{position:relative}
.login-input{width:100%;border:2px solid #e2e8f0;border-radius:10px;padding:12px 14px 12px 42px;font-family:inherit;font-size:14px;color:#1e293b;outline:none;transition:border-color 0.18s,box-shadow 0.18s;background:#fafbff;}
.login-input:focus{border-color:#6366f1;box-shadow:0 0 0 4px rgba(99,102,241,.12);background:#fff}
.login-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.login-btn{width:100%;background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;color:#fff;padding:14px;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.3px;box-shadow:0 4px 16px rgba(99,102,241,.4);transition:all 0.2s;margin-top:4px;}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.5)}
.login-btn:active{transform:translateY(0)}
.login-err{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:500;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.login-hint{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:12px 14px;font-size:12px;color:#0369a1;margin-top:16px;line-height:1.6;}
.user-menu-wrap{position:relative}
.user-btn{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--text);transition:all 0.18s;}
.user-btn:hover{border-color:var(--accent);color:var(--accent)}
.user-avatar{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.user-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);min-width:200px;z-index:200;overflow:hidden;}
.user-dd-item{display:flex;align-items:center;gap:10px;padding:11px 16px;font-size:13px;cursor:pointer;color:var(--text);transition:background 0.15s;border:none;background:none;width:100%;font-family:inherit;font-weight:500;}
.user-dd-item:hover{background:#f8fafc}
.user-dd-item.danger{color:var(--red)}
.user-dd-item.danger:hover{background:var(--red-light)}
.user-dd-sep{height:1px;background:var(--border);margin:4px 0}
.role-admin{background:#eef2ff;color:#4338ca;border:1px solid #c7d2fe;}
.role-editor{background:#f0fdf4;color:#065f46;border:1px solid #a7f3d0;}
.role-viewer{background:#f8fafc;color:#475569;border:1px solid #e2e8f0;}
/* Loading overlay */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-spinner{width:44px;height:44px;border:4px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;}

.cloud-badge{display:inline-flex;align-items:center;gap:5px;background:#f0fdf4;border:1px solid #a7f3d0;color:#065f46;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-left:8px;}
</style>

<script>
const {useState,useEffect,useRef,useCallback}=React;

// ── SUPABASE CONFIG ────────────────────────────────────────────────
const SUPA_URL='https://jogbscrdgnvrkibvbxws.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpvZ2JzY3JkZ252cmtpYnZieHdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTUzMzMsImV4cCI6MjA5NTQ5MTMzM30.VxURSrLQfAOruuQT8QAMMgNnTO4Doh2wNqcLi3UUYnE';

const db={
  async get(table,opts={}){
    let url=`${SUPA_URL}/rest/v1/${table}?`;
    if(opts.order)url+=`order=${opts.order}&`;
    if(opts.filter)url+=`${opts.filter}&`;
    url+='limit=10000';
    const r=await fetch(url,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
    if(!r.ok)throw new Error(await r.text());
    return r.json();
  },
  async insert(table,row){
    const r=await fetch(`${SUPA_URL}/rest/v1/${table}`,{
      method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
      body:JSON.stringify(row)
    });
    if(!r.ok)throw new Error(await r.text());
    return r.json();
  },
  async update(table,id,row){
    const r=await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`,{
      method:'PATCH',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
      body:JSON.stringify(row)
    });
    if(!r.ok)throw new Error(await r.text());
    return r.json();
  },
  async delete(table,id){
    const r=await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`,{
      method:'DELETE',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    if(!r.ok)throw new Error(await r.text());
  },
  async upsert(table,row){
    const r=await fetch(`${SUPA_URL}/rest/v1/${table}`,{
      method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation,resolution=merge-duplicates'},
      body:JSON.stringify(row)
    });
    if(!r.ok)throw new Error(await r.text());
    return r.json();
  }
};

// Mapeo snake_case <-> camelCase
function rowToAlmacen(r){return{id:r.id,name:r.name,location:r.location||'',description:r.description||'',active:r.active};}
function almacenToRow(a){return{id:a.id,name:a.name,location:a.location||'',description:a.description||'',active:a.active};}
function rowToTraslado(r){return{id:r.id,productId:r.product_id,productName:r.product_name,productCode:r.product_code,unit:r.unit,qty:r.qty,origenId:r.almacen_origen_id,origenName:r.almacen_origen_name,destinoId:r.almacen_destino_id,destinoName:r.almacen_destino_name,note:r.note||'',userName:r.user_name||'',date:r.created_at?new Date(r.created_at).toLocaleString('es-PE'):nowStr()};}
function rowToStock(r){return{id:r.id,productId:r.product_id,almacenId:r.almacen_id,stock:r.stock};}
function rowToProduct(r){return{id:r.id,name:r.name,code:r.code,category:r.category,unit:r.unit,price:r.price,cost:r.cost,stock:r.stock,minStock:r.min_stock,location:r.location||''};}
function productToRow(p){return{id:p.id,name:p.name,code:p.code,category:p.category,unit:p.unit,price:p.price,cost:p.cost,stock:p.stock,min_stock:p.minStock,location:p.location||''};}
function rowToKardex(r){return{id:r.id,productId:r.product_id,productName:r.product_name,productCode:r.product_code,unit:r.unit,type:r.type,qty:r.qty,reason:r.reason,ref:r.ref,cost:r.cost,stockBefore:r.stock_before,stockAfter:r.stock_after,date:r.created_at?new Date(r.created_at).toLocaleString('es-PE'):nowStr(),userName:r.user_name};}
function kardexToRow(m){return{id:m.id||genId(),product_id:m.productId,product_name:m.productName,product_code:m.productCode,unit:m.unit,type:m.type,qty:m.qty,reason:m.reason,ref:m.ref,cost:m.cost,stock_before:m.stockBefore,stock_after:m.stockAfter,user_name:m.userName||''};}
function rowToUser(r){return{id:r.id,name:r.name,username:r.username,pwHash:r.pw_hash,role:r.role,active:r.active,createdAt:r.created_at,lastLogin:r.last_login};}
function userToRow(u){return{id:u.id,name:u.name,username:u.username,pw_hash:u.pwHash,role:u.role,active:u.active,created_at:u.createdAt,last_login:u.lastLogin};}

const CATS=['LIMPIEZA','PINTURA','HERRAMIENTAS','ELECTRICIDAD','AGREGADOS','GRIFERIA','EPPS'];
const UNITS=['unidad','kg','g','lt','ml','caja','paquete','metro','par'];
const ROLES=[
  {value:'admin',  label:'Administrador', desc:'Acceso total al sistema',      color:'#4f46e5'},
  {value:'editor', label:'Editor',         desc:'Puede registrar movimientos',  color:'#059669'},
  {value:'viewer', label:'Visualizador',   desc:'Solo lectura',                 color:'#475569'},
];

function genId(){return 'P'+Date.now().toString(36).toUpperCase()+''+Math.random().toString(36).slice(2,5).toUpperCase()}
function genBarcode(){return(Math.floor(Math.random()*9e12)+1e12).toString()}
function nowStr(){return new Date().toLocaleString('es-PE')}
function hashPw(pw){let h=0;for(let i=0;i<pw.length;i++){h=(Math.imul(31,h)+pw.charCodeAt(i))|0;}return h.toString(16);}

const DEFAULT_USERS=[
  {id:'u1',name:'Administrador',username:'admin',   pwHash:hashPw('admin123'),role:'admin', active:true, createdAt:'Sistema',lastLogin:null},
  {id:'u2',name:'María López',  username:'maria',   pwHash:hashPw('maria123'), role:'editor',active:true, createdAt:nowStr(),lastLogin:null},
  {id:'u3',name:'Carlos Ruiz',  username:'carlos',  pwHash:hashPw('carlos123'),role:'viewer',active:true, createdAt:nowStr(),lastLogin:null},

// ── APP ROOT ───────────────────────────────────────────────────────
function App(){
  const [session,setSession]   =useState(null);
  const [page,setPage]         =useState('dashboard');
  const [products,setProducts] =useState([]);
  const [kardex,setKardex]     =useState([]);
  const [users,setUsers]       =useState([]);
  const [almacenes,setAlmacenes]=useState([]);
  const [traslados,setTraslados]=useState([]);
  const [productStock,setProductStock]=useState([]);
  const [toast,setToast]       =useState(null);
  const [showUserMenu,setShowUserMenu]=useState(false);
  const [loading,setLoading]   =useState(true);
  const [loadingMsg,setLoadingMsg]=useState('Conectando con la nube...');

  const showToast=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};

  // Cargar datos al inicio
  useEffect(()=>{
    async function init(){
      try{
        setLoadingMsg('Cargando usuarios...');
        let dbUsers=await db.get('users');
        if(!dbUsers||dbUsers.length===0){
          setLoadingMsg('Inicializando usuarios...');
          for(const u of DEFAULT_USERS) await db.upsert('users',userToRow(u));
          dbUsers=DEFAULT_USERS;
        } else {
          dbUsers=dbUsers.map(rowToUser);
        }
        setUsers(dbUsers);

        setLoadingMsg('Cargando productos...');
        let dbProds=await db.get('products',{order:'name'});
        if(!dbProds||dbProds.length===0){
          setLoadingMsg('Cargando datos de ejemplo...');
          for(const p of DEMO_PRODUCTS) await db.upsert('products',productToRow(p));
          dbProds=DEMO_PRODUCTS;
        } else {
          dbProds=dbProds.map(rowToProduct);
        }
        setProducts(dbProds);

        setLoadingMsg('Cargando kardex...');
        let dbKardex=await db.get('kardex',{order:'created_at.desc'});
        setKardex((dbKardex||[]).map(rowToKardex));

        setLoadingMsg('Cargando almacenes...');
        let dbAlm=await db.get('almacenes',{order:'name'});
        setAlmacenes((dbAlm||[]).map(rowToAlmacen));

        setLoadingMsg('Cargando traslados...');
        let dbTras=await db.get('traslados',{order:'created_at.desc'});
        setTraslados((dbTras||[]).map(rowToTraslado));

        let dbStock=await db.get('product_stock');
        setProductStock((dbStock||[]).map(rowToStock));

        setLoading(false);
      }catch(e){
        console.error(e);
        setLoadingMsg('Error de conexión: '+e.message);
        setTimeout(()=>setLoading(false),2000);
      }
    }
    init();
  },[]);

  const can=(action)=>{
    if(!session)return false;
    if(session.role==='admin')return true;
    if(session.role==='editor')return['view','move'].includes(action);
    if(session.role==='viewer')return action==='view';
    return false;
  };

  const addProduct=async(p)=>{
    try{
      await db.upsert('products',productToRow(p));
      setProducts(prev=>[...prev,p]);
      showToast('Producto registrado correctamente');
    }catch(e){showToast('Error al guardar: '+e.message,'error');}
  };

  const updateProduct=async(p)=>{
    try{
      await db.update('products',p.id,productToRow(p));
      setProducts(prev=>prev.map(x=>x.id===p.id?p:x));
      showToast('Producto actualizado');
    }catch(e){showToast('Error al actualizar: '+e.message,'error');}
  };

  const deleteProduct=async(id)=>{
    try{
      await db.delete('products',id);
      setProducts(prev=>prev.filter(x=>x.id!==id));
      showToast('Producto eliminado','error');
    }catch(e){showToast('Error al eliminar: '+e.message,'error');}
  };

  const addMovement=async(mov)=>{
    try{
      const newStock=mov.type==='entrada'
        ?mov.stockBefore+mov.qty
        :Math.max(0,mov.stockBefore-mov.qty);
      mov.stockAfter=newStock;
      const row=kardexToRow(mov);
      await db.insert('kardex',row);
      await db.update('products',mov.productId,{stock:newStock});
      setKardex(prev=>[mov,...prev]);
      setProducts(prev=>prev.map(p=>p.id===mov.productId?{...p,stock:newStock}:p));
      // Actualizar stock por almacén si se especificó
      if(mov.almacenId){
        const existing=productStock.find(s=>s.almacenId===mov.almacenId&&s.productId===mov.productId);
        const currentAlmStock=existing?existing.stock:0;
        const newAlmStock=mov.type==='entrada'
          ?currentAlmStock+mov.qty
          :Math.max(0,currentAlmStock-mov.qty);
        const psRow={id:existing?.id||genId(),product_id:mov.productId,almacen_id:mov.almacenId,stock:newAlmStock};
        await db.upsert('product_stock',psRow);
        if(existing){
          setProductStock(prev=>prev.map(s=>s.id===existing.id?{...s,stock:newAlmStock}:s));
        }else{
          setProductStock(prev=>[...prev,{id:psRow.id,productId:mov.productId,almacenId:mov.almacenId,stock:newAlmStock}]);
        }
      }
      showToast(mov.type==='entrada'?`+${mov.qty} unidades ingresadas`:`-${mov.qty} unidades despachadas`,mov.type==='entrada'?'success':'info');
    }catch(e){showToast('Error al registrar movimiento: '+e.message,'error');}
  };

  const saveUsers=async(u)=>{
    try{
      setUsers(u);
      // upsert todos los usuarios modificados
      const last=u[u.length-1];
      if(last)await db.upsert('users',userToRow(last));
    }catch(e){showToast('Error al guardar usuario: '+e.message,'error');}
  };

  const saveUsersAll=async(u)=>{
    try{
      setUsers(u);
      for(const usr of u) await db.upsert('users',userToRow(usr));
    }catch(e){showToast('Error: '+e.message,'error');}
  };

  const handleLogin=async(username,password)=>{
    const u=users.find(x=>x.username===username&&x.pwHash===hashPw(password)&&x.active);
    if(!u)return false;
    const updated=users.map(x=>x.id===u.id?{...x,lastLogin:nowStr()}:x);
    await db.update('users',u.id,{last_login:nowStr()});
    setUsers(updated);
    setSession({...u,lastLogin:nowStr()});
    setPage('dashboard');
    return true;
  };

  const handleLogout=()=>{setSession(null);setPage('dashboard');setShowUserMenu(false);};

  if(loading)return React.createElement('div',{className:'loading-overlay'},
    React.createElement('div',{className:'loading-spinner'}),
    React.createElement('div',{className:'loading-text'},loadingMsg)
  );

  if(!session)return React.createElement(LoginPage,{onLogin:handleLogin,users});

  const totalStock=products.reduce((a,p)=>a+p.stock,0);
  const totalVal  =products.reduce((a,p)=>a+p.stock*p.cost,0);
  const lowStock  =products.filter(p=>p.stock>0&&p.stock<=p.minStock).length;
  const noStock   =products.filter(p=>p.stock===0).length;

  const navItems=[
    {id:'dashboard','label':'📊 Dashboard',roles:['admin','editor','viewer']},
    {id:'productos', label:'📦 Productos', roles:['admin','editor']},
    {id:'kardex',    label:'📋 Kardex',    roles:['admin','editor']},
    {id:'etiquetas', label:'🏷️ Etiquetas', roles:['admin','editor']},
    {id:'reportes',  label:'📄 Reportes',  roles:['admin','editor','viewer']},
    {id:'almacenes', label:'🏭 Almacenes',  roles:['admin','editor']},
    {id:'traslados', label:'🔀 Traslados',  roles:['admin','editor']},
    {id:'backup',     label:'💾 Backup',     roles:['admin']},
    {id:'carga',     label:'⬆️ Masiva',    roles:['admin']},
    {id:'usuarios',  label:'👥 Usuarios',  roles:['admin']},
  ].filter(n=>n.roles.includes(session.role));

  const avatarColor={'admin':'#6366f1','editor':'#10b981','viewer':'#94a3b8'}[session.role]||'#6366f1';
  const avatarLetter=(session.name||session.username).charAt(0).toUpperCase();

  return React.createElement('div',{className:'app',onClick:()=>showUserMenu&&setShowUserMenu(false)},
    toast&&React.createElement('div',{className:`toast alert-${toast.type}`},
      toast.type==='success'?'✅':toast.type==='error'?'❌':'ℹ️',' ',toast.msg
    ),
    React.createElement('div',{className:'header'},
      React.createElement('div',{className:'logo'},
        React.createElement('div',{className:'logo-icon'},'🔨'),
        React.createElement('div',null,
          React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6}},
            React.createElement('span',{style:{fontSize:13,fontWeight:900,color:'#e63946',letterSpacing:0.5}},'GRUPO HAMMER SAC'),
            React.createElement('span',{className:'cloud-badge'},'☁️ Nube')
          ),
          React.createElement('div',{className:'logo-sub'},'Sistema de Inventario')
        )
      ),
      React.createElement('div',{className:'nav'},
        navItems.map(n=>
          React.createElement('button',{key:n.id,className:`nav-btn${page===n.id?' active':''}`,onClick:()=>setPage(n.id)},n.label)
        )
      ),
      React.createElement('div',{className:'user-menu-wrap',style:{marginLeft:12},onClick:e=>e.stopPropagation()},
        React.createElement('button',{className:'user-btn',onClick:()=>setShowUserMenu(s=>!s)},
          React.createElement('div',{className:'user-avatar',style:{background:avatarColor}},avatarLetter),
          React.createElement('div',{style:{textAlign:'left'}},
            React.createElement('div',{style:{fontSize:13,fontWeight:700,lineHeight:1.2,color:'#1e293b'}},session.name||session.username),
            React.createElement('div',{style:{fontSize:10,color:'#94a3b8',letterSpacing:'0.3px'}},ROLES.find(r=>r.value===session.role)?.label||session.role)
          ),
          React.createElement('span',{style:{fontSize:10,color:'#94a3b8',marginLeft:2}},'▾')
        ),
        showUserMenu&&React.createElement('div',{className:'user-dropdown'},
          React.createElement('div',{style:{padding:'12px 16px',borderBottom:'1px solid #f1f5f9'}},
            React.createElement('div',{style:{fontSize:13,fontWeight:700,color:'#1e293b'}},session.name),
            React.createElement('div',{style:{fontSize:11,color:'#94a3b8',marginTop:2}},`@${session.username}`),
            React.createElement('span',{className:`badge badge-purple`,style:{marginTop:6,fontSize:10}},ROLES.find(r=>r.value===session.role)?.label)
          ),
          session.role==='admin'&&React.createElement('button',{className:'user-dd-item',onClick:()=>{setPage('usuarios');setShowUserMenu(false);}},
            '👥','Administrar usuarios'
          ),
          React.createElement('button',{className:'user-dd-item',onClick:()=>{setPage('miPerfil');setShowUserMenu(false);}},
            '👤','Mi perfil'
          ),
          React.createElement('div',{className:'user-dd-sep'}),
          React.createElement('button',{className:'user-dd-item danger',onClick:handleLogout},
            '🚪','Cerrar sesión'
          )
        )
      )
    ),
    React.createElement('div',{className:'main'},
      page==='dashboard' &&React.createElement(Dashboard,{products,kardex,totalStock,totalVal,lowStock,noStock,setPage,session}),
      page==='productos'  &&(can('admin')?React.createElement(Productos,{products,addProduct,updateProduct,deleteProduct,showToast,almacenes,productStock,setProductStock}):React.createElement(NoAccess)),
      page==='kardex'     &&(can('move')||can('admin')?React.createElement(Kardex,{products,kardex,addMovement,session,almacenes,productStock,setProductStock}):React.createElement(NoAccess)),
      page==='etiquetas'  &&React.createElement(Etiquetas,{products}),
      page==='reportes'   &&React.createElement(Reportes,{products,kardex}),
      page==='almacenes'  &&(can('admin')||can('move')?React.createElement(Almacenes,{almacenes,setAlmacenes,showToast,products,productStock,setProductStock}):React.createElement(NoAccess)),
      page==='traslados'  &&(can('admin')||can('move')?React.createElement(Traslados,{almacenes,products,productStock,setProductStock,traslados,setTraslados,session,showToast}):React.createElement(NoAccess)),
      page==='backup'     &&(can('admin')?React.createElement(Backup,{products,kardex,users,almacenes,traslados,productStock,setProducts,setKardex,setUsers,setAlmacenes,setTraslados,setProductStock,showToast}):React.createElement(NoAccess)),
      page==='carga'      &&(can('admin')?React.createElement(CargaMasiva,{products,addProduct,updateProduct,showToast,almacenes,productStock,setProductStock}):React.createElement(NoAccess)),
      page==='usuarios'   &&(can('admin')?React.createElement(Usuarios,{users,saveUsers,saveUsersAll,showToast,currentUserId:session.id}):React.createElement(NoAccess)),
      page==='miPerfil'   &&React.createElement(MiPerfil,{session,users,saveUsersAll,showToast,onUpdated:(u)=>setSession(s=>({...s,...u}))})
    )
  );
}

// ── USUARIOS ───────────────────────────────────────────────────────
function Usuarios({users,saveUsers,saveUsersAll,showToast,currentUserId}){
  const empty={id:'',name:'',username:'',password:'',role:'editor',active:true};
  const [form,setForm]=useState(empty);
  const [editing,setEditing]=useState(null);
  const [showModal,setShowModal]=useState(false);
  const [err,setErr]=useState('');
  const [saving,setSaving]=useState(false);
  const [prodSearch,setProdSearch]=useState('');
  const [showSuggestions,setShowSuggestions]=useState(false);

  const openNew=()=>{setForm(empty);setEditing(null);setErr('');setShowModal(true);};
  const openEdit=(u)=>{setForm({...u,password:''});setEditing(u.id);setErr('');setShowModal(true);};
  const closeModal=()=>{setShowModal(false);setForm(empty);setEditing(null);setErr('');};

  const handleSave=async()=>{
    if(!form.name.trim()||!form.username.trim()){setErr('Nombre y usuario son obligatorios');return;}
    if(!editing&&!form.password.trim()){setErr('La contraseña es obligatoria para nuevos usuarios');return;}
    const dup=users.find(u=>u.username===form.username.trim()&&u.id!==editing);
    if(dup){setErr('Ya existe un usuario con ese nombre de usuario');return;}
    if(form.password&&form.password.length<6){setErr('La contraseña debe tener al menos 6 caracteres');return;}
    setSaving(true);
    try{
      if(editing){
        const updated=users.map(u=>{
          if(u.id!==editing)return u;
          const base={...u,name:form.name.trim(),username:form.username.trim(),role:form.role,active:form.active};
          if(form.password.trim())base.pwHash=hashPw(form.password.trim());
          return base;
        });
        await db.upsert('users',userToRow(updated.find(u=>u.id===editing)));
        saveUsersAll(updated);showToast('Usuario actualizado');
      } else {
        const nu={id:'u'+Date.now(),name:form.name.trim(),username:form.username.trim(),pwHash:hashPw(form.password.trim()),role:form.role,active:true,createdAt:nowStr(),lastLogin:null};
        await db.upsert('users',userToRow(nu));
        saveUsersAll([...users,nu]);showToast('Usuario creado correctamente');
      }
      closeModal();
    }catch(e){setErr('Error: '+e.message);}
    setSaving(false);
  };

  const toggleActive=async(id)=>{
    if(id===currentUserId){showToast('No puedes desactivar tu propia cuenta','error');return;}
    const updated=users.map(u=>u.id===id?{...u,active:!u.active}:u);
    const u=updated.find(x=>x.id===id);
    await db.update('users',id,{active:u.active});
    saveUsersAll(updated);showToast('Estado del usuario actualizado');
  };

  const deleteUser=async(id)=>{
    if(id===currentUserId){showToast('No puedes eliminar tu propia cuenta','error');return;}
    if(!confirm('¿Eliminar este usuario permanentemente?'))return;
    await db.delete('users',id);
    saveUsersAll(users.filter(u=>u.id!==id));showToast('Usuario eliminado','error');
  };

  const roleInfo=(r)=>ROLES.find(x=>x.value===r)||{label:r,color:'#94a3b8'};

  return React.createElement('div',null,
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:8}},
      React.createElement('div',null,
        React.createElement('div',{style:{fontSize:20,fontWeight:800,color:'#1e293b'}},'👥 Gestión de Usuarios'),
        React.createElement('div',{style:{fontSize:13,color:'#94a3b8',marginTop:2}},'Administra los accesos al sistema')
      ),
      React.createElement('button',{className:'btn btn-primary',onClick:openNew},'+  Nuevo usuario')
    ),
    React.createElement('div',{className:'grid3',style:{marginBottom:20}},
      ROLES.map(r=>React.createElement('div',{key:r.value,className:'stat-card',style:{'--card-color':r.color}},
        React.createElement('div',{className:'stat-num'},users.filter(u=>u.role===r.value&&u.active).length),
        React.createElement('div',{className:'stat-lbl'},r.label+'s activos'),
        React.createElement('div',{style:{fontSize:11,color:'#94a3b8',marginTop:4}},r.desc)
      ))
    ),
    React.createElement('div',{className:'card',style:{padding:0}},
      React.createElement('table',{className:'table'},
        React.createElement('thead',null,React.createElement('tr',null,
          ['Usuario','Nombre','Rol','Estado','Creado','Último acceso','Acciones'].map(h=>React.createElement('th',{key:h},h))
        )),
        React.createElement('tbody',null,
          users.map(u=>React.createElement('tr',{key:u.id,style:{opacity:u.active?1:0.55}},
            React.createElement('td',null,
              React.createElement('div',{className:'flex'},
                React.createElement('div',{style:{width:32,height:32,borderRadius:8,background:roleInfo(u.role).color,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:13,flexShrink:0}},(u.name||u.username).charAt(0).toUpperCase()),
                React.createElement('div',null,
                  React.createElement('div',{style:{fontWeight:600,fontSize:13}},u.username),
                  u.id===currentUserId&&React.createElement('span',{style:{fontSize:10,color:'#6366f1',fontWeight:600}},'(tú)')
                )
              )
            ),
            React.createElement('td',{style:{fontWeight:500}},u.name),

// ─── TRASLADOS ─────────────────────────────────────────────────────
function Traslados({almacenes,products,productStock,setProductStock,traslados,setTraslados,session,showToast}){
  const [form,setForm]=useState({productId:'',origenId:'',destinoId:'',qty:'',note:''});
  const [prodSearch,setProdSearch]=useState('');
  const [showSugg,setShowSugg]=useState(false);
  const [saving,setSaving]=useState(false);
  const [filterAlm,setFilterAlm]=useState('');

  const selProd=products.find(p=>p.id===form.productId);
  const prodSugg=prodSearch.length>=1?products.filter(p=>p.name.toLowerCase().includes(prodSearch.toLowerCase())||p.code.includes(prodSearch)).slice(0,8):[];

  const getStock=(almId,prodId)=>{
    const s=productStock.find(s=>s.almacenId===almId&&s.productId===prodId);
    return s?s.stock:0;
  };

  const stockOrigen=form.origenId&&form.productId?getStock(form.origenId,form.productId):null;

  const handleSave=async()=>{
    if(!form.productId){showToast('Selecciona un producto','error');return;}
    if(!form.origenId){showToast('Selecciona almacén origen','error');return;}
    if(!form.destinoId){showToast('Selecciona almacén destino','error');return;}
    if(form.origenId===form.destinoId){showToast('El origen y destino no pueden ser iguales','error');return;}
    const qty=parseInt(form.qty);
    if(!qty||qty<1){showToast('Cantidad inválida','error');return;}
    const stockDisp=getStock(form.origenId,form.productId);
    if(qty>stockDisp){showToast(`Stock insuficiente en origen. Disponible: ${stockDisp}`,'error');return;}
    setSaving(true);
    try{
      const almOrigen=almacenes.find(a=>a.id===form.origenId);
      const almDestino=almacenes.find(a=>a.id===form.destinoId);
      const p=selProd;
      const t={
        id:genId(),productId:p.id,productName:p.name,productCode:p.code,unit:p.unit,qty,
        origenId:form.origenId,origenName:almOrigen.name,
        destinoId:form.destinoId,destinoName:almDestino.name,
        note:form.note.trim()||'-',userName:session?.name||'',date:nowStr()
      };
      await db.insert('traslados',{
        id:t.id,product_id:t.productId,product_name:t.productName,product_code:t.productCode,
        unit:t.unit,qty:t.qty,almacen_origen_id:t.origenId,almacen_origen_name:t.origenName,
        almacen_destino_id:t.destinoId,almacen_destino_name:t.destinoName,
        note:t.note,user_name:t.userName
      });
      // Update stock origen
      const sOrigen=productStock.find(s=>s.almacenId===form.origenId&&s.productId===p.id);
      const newStockOrigen=(sOrigen?.stock||0)-qty;
      if(sOrigen){
        await db.update('product_stock',sOrigen.id,{stock:newStockOrigen});
        setProductStock(prev=>prev.map(s=>s.id===sOrigen.id?{...s,stock:newStockOrigen}:s));
      }
      // Update stock destino
      const sDestino=productStock.find(s=>s.almacenId===form.destinoId&&s.productId===p.id);
      const newStockDestino=(sDestino?.stock||0)+qty;
      if(sDestino){
        await db.update('product_stock',sDestino.id,{stock:newStockDestino});
        setProductStock(prev=>prev.map(s=>s.id===sDestino.id?{...s,stock:newStockDestino}:s));
      } else {
        const newId=genId();
        await db.upsert('product_stock',{id:newId,product_id:p.id,almacen_id:form.destinoId,stock:newStockDestino});
        setProductStock(prev=>[...prev,{id:newId,productId:p.id,almacenId:form.destinoId,stock:newStockDestino}]);
      }
      setTraslados(prev=>[t,...prev]);
      showToast(`Traslado registrado: ${qty} ${p.unit} → ${almDestino.name}`);
      setForm({productId:'',origenId:'',destinoId:'',qty:'',note:''});
      setProdSearch('');
    }catch(e){showToast('Error: '+e.message,'error');}
    setSaving(false);
  };

  const filtrados=traslados.filter(t=>!filterAlm||(t.origenId===filterAlm||t.destinoId===filterAlm));

  return React.createElement('div',null,
    React.createElement('div',{style:{fontSize:20,fontWeight:800,color:'#1e293b',marginBottom:20}},'🔀 Traslados entre Almacenes'),
    React.createElement('div',{className:'grid2'},
      React.createElement('div',null,
        React.createElement('div',{className:'section-title'},'nuevo traslado'),
        React.createElement('div',{className:'card'},
          almacenes.length<2&&React.createElement('div',{className:'alert alert-info',style:{marginBottom:16}},'ℹ️ Necesitas al menos 2 almacenes para realizar traslados. Ve a 🏭 Almacenes para crear más.'),
          React.createElement('div',{style:{marginBottom:14}},
            React.createElement('label',{className:'field-label'},'Producto *'),
            React.createElement('div',{style:{position:'relative'}},
              React.createElement('div',{style:{position:'relative'}},
                React.createElement('span',{style:{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:15,pointerEvents:'none'}},'🔎'),
                React.createElement('input',{className:'input',style:{paddingLeft:38,background:selProd?'#f0fdf4':'#fff',borderColor:selProd?'#86efac':''},
                  placeholder:'Buscar producto...',
                  value:selProd?selProd.name:prodSearch,
                  onChange:e=>{setProdSearch(e.target.value);setShowSugg(true);if(!e.target.value)setForm(f=>({...f,productId:'',origenId:'',destinoId:''}));},
                  onFocus:()=>{if(selProd){setProdSearch('');setForm(f=>({...f,productId:'',origenId:'',destinoId:''}));}setShowSugg(true);},
                  onBlur:()=>setTimeout(()=>setShowSugg(false),180)
                }),
                selProd&&React.createElement('button',{style:{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:16,color:'#94a3b8'},onClick:()=>{setForm(f=>({...f,productId:'',origenId:'',destinoId:''}));setProdSearch('');}},'×')
              ),
              showSugg&&prodSugg.length>0&&React.createElement('div',{style:{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'#fff',border:'1.5px solid #6366f1',borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,.12)',zIndex:300,maxHeight:220,overflowY:'auto'}},
                prodSugg.map(p=>React.createElement('div',{key:p.id,style:{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'},
                  onMouseDown:()=>{setForm(f=>({...f,productId:p.id,origenId:'',destinoId:''}));setProdSearch('');setShowSugg(false);}},
                  React.createElement('div',null,
                    React.createElement('div',{style:{fontWeight:600,fontSize:13}},p.name),
                    React.createElement('div',{style:{fontSize:11,color:'#94a3b8'}},p.code+' · '+p.unit)
                  ),
                  React.createElement('span',{className:'badge badge-blue'},'Stock: '+p.stock)
                ))
              )
            )
          ),
          selProd&&React.createElement('div',{style:{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:8,padding:'10px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:12}},
            React.createElement('div',{style:{fontSize:22}},'📦'),
            React.createElement('div',{style:{flex:1}},React.createElement('div',{style:{fontWeight:700,fontSize:14,color:'#065f46'}},selProd.name),React.createElement('div',{style:{fontSize:11,color:'#6b7280'}},selProd.code+' · '+selProd.unit)),
            React.createElement('div',{style:{textAlign:'right'}},React.createElement('div',{style:{fontSize:20,fontWeight:800,color:'#10b981'}},selProd.stock),React.createElement('div',{style:{fontSize:11,color:'#94a3b8'}},'stock total'))
          ),
          React.createElement('div',{className:'grid2',style:{marginBottom:14}},
            React.createElement('div',null,
              React.createElement('label',{className:'field-label'},'Almacén Origen *'),
              React.createElement('select',{className:'select',value:form.origenId,onChange:e=>setForm({...form,origenId:e.target.value,destinoId:''})},
                React.createElement('option',{value:''},'— Seleccionar origen —'),
                almacenes.filter(a=>a.active).map(a=>{
                  const s=form.productId?getStock(a.id,form.productId):0;
                  return React.createElement('option',{key:a.id,value:a.id},a.name+(form.productId?` (${s} uds)`:'')); 
                })
              ),
              form.origenId&&form.productId&&React.createElement('div',{style:{fontSize:11,marginTop:6,color:stockOrigen>0?'#10b981':'#ef4444',fontWeight:600}},
                stockOrigen>0?`✅ Disponible: ${stockOrigen} ${selProd?.unit||''}`:`❌ Sin stock en este almacén`
              )
            ),
            React.createElement('div',null,
              React.createElement('label',{className:'field-label'},'Almacén Destino *'),
              React.createElement('select',{className:'select',value:form.destinoId,onChange:e=>setForm({...form,destinoId:e.target.value})},
                React.createElement('option',{value:''},'— Seleccionar destino —'),
                almacenes.filter(a=>a.active&&a.id!==form.origenId).map(a=>React.createElement('option',{key:a.id,value:a.id},a.name))
              )
            )
          ),
          React.createElement('div',{className:'grid2',style:{marginBottom:14}},
            React.createElement('div',null,
              React.createElement('label',{className:'field-label'},'Cantidad *'),
              React.createElement('input',{className:'input',type:'number',min:'1',max:stockOrigen||undefined,value:form.qty,onChange:e=>setForm({...form,qty:e.target.value}),placeholder:'0'})
            ),
            React.createElement('div',null,
              React.createElement('label',{className:'field-label'},'Nota'),
              React.createElement('input',{className:'input',value:form.note,onChange:e=>setForm({...form,note:e.target.value}),placeholder:'Motivo del traslado...'})
            )
          ),
          form.qty&&form.origenId&&form.destinoId&&selProd&&React.createElement('div',{className:'alert alert-info',style:{marginBottom:14}},
            `🔀 Se trasladarán ${form.qty} ${selProd.unit} de "${almacenes.find(a=>a.id===form.origenId)?.name}" → "${almacenes.find(a=>a.id===form.destinoId)?.name}"`
          ),
          React.createElement('button',{className:'btn btn-primary',onClick:handleSave,disabled:saving||almacenes.length<2,style:{width:'100%',justifyContent:'center',padding:'12px'}},saving?'Registrando...':`🔀 Registrar Traslado`)
        )
      ),
      React.createElement('div',null,
        React.createElement('div',{className:'section-title'},'historial de traslados'),
        React.createElement('div',{className:'flex',style:{marginBottom:12}},
          React.createElement('select',{className:'select',value:filterAlm,onChange:e=>setFilterAlm(e.target.value)},
            React.createElement('option',{value:''},'Todos los almacenes'),
            almacenes.map(a=>React.createElement('option',{key:a.id,value:a.id},a.name))
          )
        ),
        React.createElement('div',{className:'card',style:{padding:0}},

            filtrados.length===0
              ?React.createElement('div',{className:'empty'},React.createElement('div',{className:'empty-icon'},'🔀'),React.createElement('div',{className:'empty-text'},'Sin traslados registrados'))

                  React.createElement('tbody',null,
                    filtrados.map((t,i)=>React.createElement('tr',{key:i},

                      React.createElement('td',{style:{fontWeight:700,color:'#6366f1',textAlign:'center'}},t.qty+' '+t.unit),
                      React.createElement('td',null,React.createElement('span',{className:'badge badge-red',style:{fontSize:10}},t.origenName)),
                      React.createElement('td',null,React.createElement('span',{className:'badge badge-green',style:{fontSize:10}},t.destinoName)),
                      React.createElement('td',{style:{maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12,color:'#64748b'}},t.note),
                      React.createElement('td',{style:{fontSize:11,color:'#94a3b8'}},t.userName)
                    ))

                )
          )
        )
      )
    )
  );
}


// ─── BACKUP ────────────────────────────────────────────────────────
function Backup({products,kardex,users,almacenes,traslados,productStock,setProducts,setKardex,setUsers,setAlmacenes,setTraslados,setProductStock,showToast}){
  const [restoring,setRestoring]=useState(false);
  const [preview,setPreview]=useState(null);
  const [dragOver,setDragOver]=useState(false);
  const fileRef=useRef(null);

  const doBackup=()=>{
    const backup={
      version:'1.0',
      fecha:new Date().toISOString(),
      empresa:'GRUPO HAMMER SAC',
      stats:{productos:products.length,movimientos:kardex.length,usuarios:users.length,almacenes:almacenes.length,traslados:traslados.length},
      data:{products,kardex,users,almacenes,traslados,productStock}
    };
    const json=JSON.stringify(backup,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    const fecha=new Date().toLocaleDateString('es-PE').replace(/\//g,'-');
    a.download=`hammer_backup_${fecha}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    showToast('Backup descargado correctamente');
  };

  const parseFile=(file)=>{
    if(!file)return;
    if(!file.name.endsWith('.json')){showToast('Solo se aceptan archivos .json','error');return;}
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.version||!data.data){showToast('Archivo de backup inválido','error');return;}
        setPreview(data);
      }catch(err){showToast('Error al leer el archivo','error');}
    };
    reader.readAsText(file);
  };

  const doRestore=async()=>{
    if(!preview)return;
    if(!confirm('¿Restaurar el backup? Esto reemplazará TODOS los datos actuales en la nube. Esta acción no se puede deshacer.'))return;
    setRestoring(true);
    try{
      const {products:ps,kardex:ks,users:us,almacenes:as,traslados:ts,productStock:ss}=preview.data;

      showToast('Restaurando productos...','info');
      for(const p of (ps||[])) await db.upsert('products',productToRow(p));
      setProducts(ps||[]);

      showToast('Restaurando kardex...','info');
      for(const k of (ks||[])){
        const row=kardexToRow(k);
        try{await db.upsert('kardex',row);}catch(e){}
      }
      setKardex(ks||[]);

      showToast('Restaurando usuarios...','info');
      for(const u of (us||[])) await db.upsert('users',userToRow(u));
      setUsers(us||[]);

      showToast('Restaurando almacenes...','info');
      for(const a of (as||[])) await db.upsert('almacenes',almacenToRow(a));
      setAlmacenes(as||[]);

      showToast('Restaurando traslados...','info');
      for(const t of (ts||[])){
        try{
          await db.upsert('traslados',{id:t.id,product_id:t.productId,product_name:t.productName,product_code:t.productCode,unit:t.unit,qty:t.qty,almacen_origen_id:t.origenId,almacen_origen_name:t.origenName,almacen_destino_id:t.destinoId,almacen_destino_name:t.destinoName,note:t.note,user_name:t.userName});
        }catch(e){}
      }
      setTraslados(ts||[]);

      showToast('Restaurando stock por almacén...','info');
      for(const s of (ss||[])){
        try{await db.upsert('product_stock',{id:s.id,product_id:s.productId,almacen_id:s.almacenId,stock:s.stock});}catch(e){}
      }
      setProductStock(ss||[]);

      showToast('✅ Backup restaurado correctamente');
      setPreview(null);
    }catch(e){showToast('Error al restaurar: '+e.message,'error');}
    setRestoring(false);
  };

  const fmt=(d)=>new Date(d).toLocaleString('es-PE');

  return React.createElement('div',null,
    React.createElement('div',{style:{fontSize:20,fontWeight:800,color:'#1e293b',marginBottom:4}},'💾 Backup y Restauración'),
    React.createElement('div',{style:{fontSize:13,color:'#94a3b8',marginBottom:24}},'Descarga una copia de seguridad de toda la información o restaura desde un backup anterior'),

    // DOWNLOAD SECTION
    React.createElement('div',{className:'section-title'},'descargar backup'),
    React.createElement('div',{className:'card',style:{background:'linear-gradient(135deg,#f0fdf4,#ecfdf5)',border:'1px solid #a7f3d0',marginBottom:24}},
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}},
        React.createElement('div',{style:{fontSize:48}},'💾'),
        React.createElement('div',{style:{flex:1}},
          React.createElement('div',{style:{fontSize:16,fontWeight:700,color:'#065f46',marginBottom:4}},'Exportar toda la información'),
          React.createElement('div',{style:{fontSize:13,color:'#047857',marginBottom:12}},'Se descargará un archivo JSON con productos, kardex, usuarios, almacenes, traslados y stock.'),
          React.createElement('div',{className:'grid4',style:{marginBottom:16}},
            [['📦',products.length,'Productos'],['📋',kardex.length,'Movimientos'],['🏭',almacenes.length,'Almacenes'],['👥',users.length,'Usuarios']].map(([ico,n,lbl])=>
              React.createElement('div',{key:lbl,style:{background:'white',borderRadius:8,padding:'10px',textAlign:'center',border:'1px solid #a7f3d0'}},
                React.createElement('div',{style:{fontSize:20}},[ico]),
                React.createElement('div',{style:{fontSize:20,fontWeight:800,color:'#065f46'}},[n]),
                React.createElement('div',{style:{fontSize:11,color:'#94a3b8'}},[lbl])
              )
            )
          ),
          React.createElement('button',{className:'btn btn-green',style:{padding:'12px 32px',fontSize:14},onClick:doBackup},'⬇️  Descargar Backup Ahora')
        )
      )
    ),

    // RESTORE SECTION
    React.createElement('div',{className:'section-title'},'restaurar desde backup'),
    !preview&&React.createElement('div',{className:'card'},
      React.createElement('div',{
        style:{border:`2px dashed ${dragOver?'#6366f1':'#cbd5e1'}`,borderRadius:10,padding:'40px 20px',textAlign:'center',background:dragOver?'#eef2ff':'#fafbff',cursor:'pointer',transition:'all 0.2s'},
        onDragOver:e=>{e.preventDefault();setDragOver(true);},
        onDragLeave:()=>setDragOver(false),
        onDrop:e=>{e.preventDefault();setDragOver(false);parseFile(e.dataTransfer.files[0]);},
        onClick:()=>fileRef.current&&fileRef.current.click()
      },
        React.createElement('div',{style:{fontSize:48,marginBottom:12}},dragOver?'📂':'📁'),
        React.createElement('div',{style:{fontSize:15,fontWeight:700,color:'#1e293b',marginBottom:6}},dragOver?'Suelta el archivo aquí':'Selecciona o arrastra tu backup'),
        React.createElement('div',{style:{fontSize:12,color:'#94a3b8'}},'Solo archivos .json generados por este sistema')
      ),
      React.createElement('input',{ref:fileRef,type:'file',accept:'.json',style:{display:'none'},onChange:e=>parseFile(e.target.files[0])}),
      React.createElement('button',{className:'btn btn-outline',style:{width:'100%',justifyContent:'center',marginTop:12},onClick:()=>fileRef.current&&fileRef.current.click()},'📂  Seleccionar archivo de backup')
    ),

    preview&&React.createElement('div',null,
      React.createElement('div',{className:'card',style:{background:'#fffbeb',border:'2px solid #fcd34d',marginBottom:16}},
        React.createElement('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:16}},
          React.createElement('div',{style:{fontSize:36}},'⚠️'),
          React.createElement('div',null,
            React.createElement('div',{style:{fontSize:15,fontWeight:800,color:'#92400e'}},'Confirmar Restauración'),
            React.createElement('div',{style:{fontSize:13,color:'#b45309',marginTop:2}},'Esta acción reemplazará TODOS los datos actuales en Supabase. No se puede deshacer.')
          )
        ),
        React.createElement('div',{style:{background:'white',borderRadius:8,padding:'14px 16px',marginBottom:16,border:'1px solid #fcd34d'}},
          React.createElement('div',{style:{fontSize:12,fontWeight:700,color:'#92400e',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.5px'}},'Información del backup'),
          React.createElement('div',{className:'grid2'},
            React.createElement('div',null,
              [['📅 Fecha',fmt(preview.fecha)],['🏢 Empresa',preview.empresa||'—'],['📌 Versión',preview.version||'—']].map(([k,v])=>
                React.createElement('div',{key:k,style:{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #fef3c7',fontSize:13}},
                  React.createElement('span',{style:{color:'#92400e',fontWeight:600}},k),
                  React.createElement('span',{style:{color:'#1e293b',fontWeight:500}},v)
                )
              )
            ),
            React.createElement('div',null,
              [['📦 Productos',preview.stats?.productos||0],['📋 Movimientos',preview.stats?.movimientos||0],['🏭 Almacenes',preview.stats?.almacenes||0],['👥 Usuarios',preview.stats?.usuarios||0],['🔀 Traslados',preview.stats?.traslados||0]].map(([k,v])=>
                React.createElement('div',{key:k,style:{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #fef3c7',fontSize:13}},
                  React.createElement('span',{style:{color:'#92400e',fontWeight:600}},k),
                  React.createElement('span',{style:{fontWeight:800,color:'#6366f1'}},v)
                )
              )
            )
          )
        ),
        React.createElement('div',{className:'flex',style:{justifyContent:'flex-end',gap:10}},
          React.createElement('button',{className:'btn btn-outline',onClick:()=>setPreview(null),disabled:restoring},'✕ Cancelar'),
          React.createElement('button',{className:'btn btn-red-solid',style:{padding:'11px 28px',fontSize:14},onClick:doRestore,disabled:restoring},
            restoring?'Restaurando... por favor espera':'🔄 Confirmar Restauración'
          )
        )
      ),
      restoring&&React.createElement('div',{className:'alert alert-info'},'⏳ Restaurando datos en Supabase, no cierres esta ventana...')
    ),

    // INFO SECTION
    React.createElement('div',{className:'section-title',style:{marginTop:24}},'recomendaciones'),
    React.createElement('div',{className:'card'},
      React.createElement('div',{className:'grid2'},
        [
          ['✅','Frecuencia recomendada','Realiza un backup al menos una vez por semana o antes de hacer cambios masivos.'],
          ['🔒','Seguridad','Guarda el archivo en un lugar seguro. Contiene información sensible de tu negocio.'],
          ['📂','Organización','Nombra tus backups con la fecha para identificarlos fácilmente.'],
          ['⚠️','Restauración','Al restaurar se sobrescriben todos los datos actuales. Descarga un backup previo antes de restaurar.'],
        ].map(([ico,tit,desc])=>
          React.createElement('div',{key:tit,style:{display:'flex',gap:12,padding:'10px',background:'#f8fafc',borderRadius:8,border:'1px solid #e2e8f0'}},
            React.createElement('div',{style:{fontSize:24,flexShrink:0}},ico),
            React.createElement('div',null,
              React.createElement('div',{style:{fontSize:13,fontWeight:700,color:'#1e293b',marginBottom:3}},tit),
              React.createElement('div',{style:{fontSize:12,color:'#64748b'}},desc)
            )
          )
        )
      )
    )
  );
}

// ─── MOUNT ─────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
